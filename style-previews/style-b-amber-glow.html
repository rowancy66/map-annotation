<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暖琥珀光 · 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'IBM Plex Sans', sans-serif; background: #0f0b08; color: #d4cabc; height: 100vh; display: flex; flex-direction: column; }

/* top bar */
header {
  height: 48px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; background: #18120d; border-bottom: 1px solid rgba(251,191,36,0.06);
}
header .left { display: flex; align-items: center; gap: 12px; }
header .logo { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, #f59e0b, #d97706); display: flex; align-items: center; justify-content: center; font-size: 14px; color: #0f0b08; font-weight: 700; }
header h1 { font-size: 13px; font-weight: 500; color: #e8ddd0; }
header .badge { font-size: 10px; padding: 1px 8px; border-radius: 20px; background: rgba(251,191,36,0.1); color: #fbbf24; font-weight: 500; }
header .actions { display: flex; align-items: center; gap: 6px; }
header .actions span { font-size: 12px; color: #7a7064; padding: 6px 10px; border-radius: 6px; cursor: default; }
header .actions .btn { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #7a7064; font-size: 14px; cursor: default; }

/* main */
.main { flex: 1; display: flex; overflow: hidden; }

/* sidebar */
.sidebar { width: 320px; background: #18120d; border-right: 1px solid rgba(251,191,36,0.06); display: flex; flex-direction: column; }
.sidebar-tabs { display: flex; gap: 4px; padding: 12px 16px 8px; border-bottom: 1px solid rgba(251,191,36,0.06); }
.sidebar-tabs span { padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: default; color: #7a7064; }
.sidebar-tabs .active { background: rgba(251,191,36,0.08); color: #fbbf24; font-weight: 500; }
.sidebar-search { padding: 10px 16px; border-bottom: 1px solid rgba(251,191,36,0.06); }
.sidebar-search input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(251,191,36,0.08); background: rgba(255,255,255,0.02); font-size: 12px; color: #d4cabc; outline: none; font-family: inherit; }
.sidebar-search input:focus { border-color: rgba(251,191,36,0.3); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: default; border-left: 2px solid transparent; }
.item.active { background: rgba(251,191,36,0.03); border-left-color: #fbbf24; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.point { background: #f87171; }
.dot.line { background: #60a5fa; }
.dot.polygon { background: #a78bfa; }
.item-text { flex: 1; min-width: 0; }
.item-text .name { font-size: 13px; font-weight: 500; color: #e8ddd0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-text .desc { font-size: 11px; color: #7a7064; margin-top: 1px; }
.item-tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 500; }
.item-tag.point { background: rgba(248,113,113,0.1); color: #fca5a5; }
.item-tag.line { background: rgba(96,165,250,0.1); color: #93c5fd; }
.item-tag.polygon { background: rgba(167,139,250,0.1); color: #c4b5fd; }
.sidebar-footer { padding: 8px 16px; border-top: 1px solid rgba(251,191,36,0.06); font-size: 11px; color: #7a7064; display: flex; justify-content: space-between; }

/* map area */
.map-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #120e09; overflow: hidden; }
.map-area::before { content: ''; position: absolute; top: 50%; left: 50%; width: 600px; height: 600px; transform: translate(-50%,-50%); background: radial-gradient(circle, rgba(251,191,36,0.04) 0%, transparent 70%); }
.map-area .center-text { font-size: 14px; color: #3a3228; letter-spacing: 0.05em; font-family: 'JetBrains Mono', monospace; z-index: 1; }

/* drawing toolbar */
.toolbar { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 4px; padding: 6px; background: rgba(24,18,13,0.85); backdrop-filter: blur(12px); border-radius: 14px; border: 1px solid rgba(251,191,36,0.08); }
.toolbar .tool { width: 44px; height: 44px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #7a7064; font-size: 10px; cursor: default; }
.toolbar .tool.active { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f0b08; font-weight: 500; }
.toolbar .tool svg { width: 18px; height: 18px; margin-bottom: 1px; }

/* InfoCard */
.infocard { position: absolute; right: 80px; top: 20px; width: 320px; background: rgba(24,18,13,0.9); backdrop-filter: blur(16px); border-radius: 16px; border: 1px solid rgba(251,191,36,0.08); padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 80px rgba(251,191,36,0.02); }
.infocard .title { font-size: 14px; font-weight: 600; color: #e8ddd0; margin-bottom: 12px; display: flex; justify-content: space-between; }
.infocard .field { margin-bottom: 10px; }
.infocard .field label { font-size: 11px; color: #7a7064; display: block; margin-bottom: 3px; }
.infocard .field input { width: 100%; padding: 7px 10px; border-radius: 8px; border: 1px solid rgba(251,191,36,0.08); background: rgba(255,255,255,0.02); font-size: 12px; color: #d4cabc; outline: none; font-family: inherit; }
.infocard .actions { display: flex; gap: 8px; margin-top: 14px; }
.infocard .actions .btn { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 12px; cursor: default; font-family: inherit; }
.infocard .actions .btn.primary { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f0b08; font-weight: 600; }
.infocard .actions .btn.danger { background: rgba(239,68,68,0.1); color: #f87171; }

.style-label { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; font-family: 'JetBrains Mono', monospace; z-index: 100; }
</style>
</head>
<body>

<header>
  <div class="left">
    <div class="logo">📍</div>
    <h1>李沧区地块数据</h1>
    <span class="badge">编辑</span>
  </div>
  <div class="actions">
    <span>导入</span>
    <span>导出</span>
    <div class="btn">⚙️</div>
    <div class="btn" style="margin-left:4px">👤</div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-tabs">
      <span class="active">列表</span>
      <span>分组</span>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="搜索标注..." />
    </div>
    <div class="sidebar-list">
      <div class="item active">
        <div class="dot point"></div>
        <div class="item-text">
          <div class="name">地块 A-01</div>
          <div class="desc">面积 45.2 亩</div>
        </div>
        <span class="item-tag point">点</span>
      </div>
      <div class="item">
        <div class="dot polygon"></div>
        <div class="item-text">
          <div class="name">规划区域 B</div>
          <div class="desc">容积率 2.5</div>
        </div>
        <span class="item-tag polygon">面</span>
      </div>
      <div class="item">
        <div class="dot line"></div>
        <div class="item-text">
          <div class="name">地铁 3 号线</div>
          <div class="desc">长度 12.3 km</div>
        </div>
        <span class="item-tag line">线</span>
      </div>
    </div>
    <div class="sidebar-footer">共 3 个标注 · 2 个分组</div>
  </div>

  <div class="map-area">
    <div class="center-text">🗺️ 地图区域</div>
    <div class="toolbar">
      <div class="tool active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        选择
      </div>
      <div class="tool">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        点
      </div>
      <div class="tool">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 9 11 14 14 20 4"/></svg>
        线
      </div>
      <div class="tool">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 9 18 21 6 21 2 9"/></svg>
        面
      </div>
    </div>

    <div class="infocard">
      <div class="title">
        <span>地块 A-01</span>
        <span style="color:#7a7064; font-size:12px; cursor:default;">✕</span>
      </div>
      <div class="field">
        <label>名称</label>
        <input type="text" value="地块 A-01" />
      </div>
      <div class="field">
        <label>面积 (㎡)</label>
        <input type="text" value="45.2" />
      </div>
      <div class="field">
        <label>容积率</label>
        <input type="text" value="2.5" />
      </div>
      <div class="actions">
        <button class="btn primary">保存</button>
        <button class="btn danger">删除</button>
      </div>
    </div>
  </div>
</div>

<div class="style-label">STYLE B · 暖琥珀光 · accent #fbbf24</div>

</body>
</html>
