<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柔雾粉彩 · 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:opsz,wght@5..1200,400;5..1200,500;5..1200,600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #f5f0ec; color: #4a4040; height: 100vh; display: flex; flex-direction: column; }

header { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(180,150,140,0.12); }
header .left { display: flex; align-items: center; gap: 12px; }
header .logo { width: 30px; height: 30px; border-radius: 12px; background: #d4a0a0; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 8px rgba(212,160,160,0.2); }
header h1 { font-size: 14px; font-weight: 600; color: #4a4040; letter-spacing: -0.01em; }
header .badge { font-size: 10px; padding: 2px 10px; border-radius: 20px; background: rgba(160,180,160,0.2); color: #7a8a7a; font-weight: 500; }
header .actions { display: flex; align-items: center; gap: 8px; }
header .actions span { font-size: 12px; color: #9a8a8a; padding: 6px 12px; border-radius: 20px; cursor: default; }
header .actions span:hover { background: rgba(180,150,140,0.08); }

.main { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 320px; background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); border-right: 1px solid rgba(180,150,140,0.1); display: flex; flex-direction: column; }
.sidebar-tabs { display: flex; gap: 8px; padding: 14px 20px 10px; border-bottom: 1px solid rgba(180,150,140,0.1); }
.sidebar-tabs span { padding: 4px 14px; border-radius: 20px; font-size: 12px; cursor: default; color: #9a8a8a; }
.sidebar-tabs .active { background: rgba(212,160,160,0.15); color: #b07070; font-weight: 500; }
.sidebar-search { padding: 12px 20px; border-bottom: 1px solid rgba(180,150,140,0.1); }
.sidebar-search input { width: 100%; padding: 8px 14px; border-radius: 20px; border: 1px solid rgba(180,150,140,0.15); background: rgba(255,255,255,0.5); font-size: 12px; color: #4a4040; outline: none; font-family: inherit; }
.sidebar-search input:focus { border-color: rgba(180,150,140,0.3); background: rgba(255,255,255,0.7); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; }
.item { display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: default; border-radius: 0; margin: 0 8px; border-radius: 12px; }
.item.active { background: rgba(255,255,255,0.6); }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.point { background: #d4a0a0; }
.dot.line { background: #a0b4d4; }
.dot.polygon { background: #a0c4a0; }
.item-text { flex: 1; min-width: 0; }
.item-text .name { font-size: 13px; font-weight: 500; color: #4a4040; }
.item-text .desc { font-size: 11px; color: #a09090; margin-top: 1px; }
.item-tag { font-size: 10px; padding: 1px 8px; border-radius: 10px; font-weight: 500; }
.item-tag.point { background: rgba(212,160,160,0.1); color: #c08080; }
.item-tag.line { background: rgba(160,180,212,0.1); color: #8090b0; }
.item-tag.polygon { background: rgba(160,196,160,0.1); color: #80a080; }
.sidebar-footer { padding: 10px 20px; border-top: 1px solid rgba(180,150,140,0.1); font-size: 11px; color: #a09090; display: flex; justify-content: space-between; }

.map-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #f0eae4; }
.map-area .dots-bg { position: absolute; inset: 0; opacity: 0.04; background-image: radial-gradient(#8a7a7a 1px, transparent 1px); background-size: 20px 20px; }
.map-area .center-text { font-size: 13px; color: #c8b8b0; z-index: 1; font-family: 'DM Sans', sans-serif; }

.toolbar { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 6px; padding: 10px; background: rgba(255,255,255,0.6); backdrop-filter: blur(16px); border-radius: 20px; border: 1px solid rgba(180,150,140,0.1); }
.toolbar .tool { width: 44px; height: 44px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9a8a8a; font-size: 10px; cursor: default; }
.toolbar .tool.active { background: rgba(212,160,160,0.2); color: #b07070; box-shadow: 0 0 0 1px rgba(212,160,160,0.15); }
.toolbar .tool svg { width: 18px; height: 18px; margin-bottom: 1px; }

.infocard { position: absolute; right: 80px; top: 20px; width: 300px; background: rgba(255,255,255,0.75); backdrop-filter: blur(24px); border-radius: 24px; border: 1px solid rgba(180,150,140,0.1); padding: 24px; box-shadow: 0 8px 32px rgba(180,150,140,0.08); }
.infocard .title { font-size: 14px; font-weight: 600; color: #4a4040; margin-bottom: 14px; display: flex; justify-content: space-between; }
.infocard .field { margin-bottom: 10px; }
.infocard .field label { font-size: 10px; color: #a09090; display: block; margin-bottom: 4px; }
.infocard .field input { width: 100%; padding: 8px 12px; border-radius: 14px; border: 1px solid rgba(180,150,140,0.12); background: rgba(255,255,255,0.5); font-size: 12px; color: #4a4040; outline: none; font-family: inherit; }
.infocard .actions { display: flex; gap: 8px; margin-top: 16px; }
.infocard .actions .btn { flex: 1; padding: 8px 12px; border-radius: 14px; border: none; font-size: 12px; cursor: default; font-family: inherit; font-weight: 500; }
.infocard .actions .btn.primary { background: rgba(212,160,160,0.3); color: #b07070; }
.infocard .actions .btn.danger { background: rgba(180,150,140,0.1); color: #9a8a8a; }

.style-label { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 10px; color: rgba(0,0,0,0.15); letter-spacing: 0.12em; z-index: 100; }
</style>
</head>
<body>
<header>
  <div class="left"><div class="logo">📍</div><h1>李沧区地块数据</h1><span class="badge">编辑</span></div>
  <div class="actions"><span>导入</span><span>导出</span><span>⚙</span></div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-tabs"><span class="active">列表</span><span>分组</span></div>
    <div class="sidebar-search"><input type="text" placeholder="搜索标注..." /></div>
    <div class="sidebar-list">
      <div class="item active"><div class="dot point"></div><div class="item-text"><div class="name">地块 A-01</div><div class="desc">面积 45.2 亩</div></div><span class="item-tag point">点</span></div>
      <div class="item"><div class="dot polygon"></div><div class="item-text"><div class="name">规划区域 B</div><div class="desc">容积率 2.5</div></div><span class="item-tag polygon">面</span></div>
      <div class="item"><div class="dot line"></div><div class="item-text"><div class="name">地铁 3 号线</div><div class="desc">长度 12.3 km</div></div><span class="item-tag line">线</span></div>
    </div>
    <div class="sidebar-footer">3 个标注 · 2 个分组</div>
  </div>
  <div class="map-area">
    <div class="dots-bg"></div><div class="center-text">🗺️ 地图区域</div>
    <div class="toolbar">
      <div class="tool active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>选择</div>
      <div class="tool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>点</div>
      <div class="tool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4 17 9 11 14 14 20 4"/></svg>线</div>
      <div class="tool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 22 9 18 21 6 21 2 9"/></svg>面</div>
    </div>
    <div class="infocard">
      <div class="title"><span>地块 A-01</span><span style="color:#a09090;cursor:default;">✕</span></div>
      <div class="field"><label>名称</label><input type="text" value="地块 A-01" /></div>
      <div class="field"><label>面积 (㎡)</label><input type="text" value="45.2" /></div>
      <div class="field"><label>容积率</label><input type="text" value="2.5" /></div>
      <div class="actions"><button class="btn primary">保存</button><button class="btn danger">删除</button></div>
    </div>
  </div>
</div>
<div class="style-label">STYLE G · 柔雾粉彩 · 毛玻璃 · 柔和色调</div>
</body>
</html>
