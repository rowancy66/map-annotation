<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翡翠暗夜 · 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:opsz,wght@5..1200,500;5..1200,600;5..1200,700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070b09; color: #d4dcd4; height: 100vh; display: flex; flex-direction: column; }
header { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: #0c110e; border-bottom: 1px solid rgba(45,138,110,0.12); }
header .left { display: flex; align-items: center; gap: 14px; }
header .logo { width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg, #2d8a6e, #1a6b52); display: flex; align-items: center; justify-content: center; font-size: 15px; box-shadow: 0 2px 12px rgba(45,138,110,0.25); }
header h1 { font-size: 15px; font-weight: 600; color: #e8ece8; letter-spacing: -0.01em; }
header .badge { font-size: 10px; padding: 3px 10px; border-radius: 20px; background: rgba(201,168,76,0.12); color: #c9a84c; font-weight: 600; letter-spacing: 0.03em; border: 1px solid rgba(201,168,76,0.15); }
header .actions { display: flex; align-items: center; gap: 8px; }
header .actions span { font-size: 12px; color: #6a7a6a; padding: 6px 12px; border-radius: 8px; cursor: default; }
header .actions span:hover { background: rgba(255,255,255,0.03); }

.main { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 320px; background: #0c110e; border-right: 1px solid rgba(45,138,110,0.08); display: flex; flex-direction: column; }
.sidebar-tabs { display: flex; gap: 0; padding: 14px 20px 10px; border-bottom: 1px solid rgba(45,138,110,0.08); }
.sidebar-tabs span { padding: 5px 0; margin-right: 20px; font-size: 12px; cursor: default; color: #6a7a6a; border-bottom: 2px solid transparent; letter-spacing: 0.02em; }
.sidebar-tabs .active { color: #c9a84c; border-bottom-color: #c9a84c; font-weight: 600; }
.sidebar-search { padding: 12px 20px; border-bottom: 1px solid rgba(45,138,110,0.08); }
.sidebar-search input { width: 100%; padding: 9px 14px; border-radius: 10px; border: 1px solid rgba(45,138,110,0.12); background: rgba(255,255,255,0.02); font-size: 12px; color: #d4dcd4; outline: none; font-family: inherit; }
.sidebar-search input:focus { border-color: rgba(201,168,76,0.3); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; }
.item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: default; }
.item.active { background: linear-gradient(90deg, rgba(45,138,110,0.06), transparent); }
.item .indicator { width: 3px; height: 24px; border-radius: 2px; flex-shrink: 0; }
.item .indicator.point { background: #c9a84c; }
.item .indicator.line { background: #4a8a8a; }
.item .indicator.polygon { background: #6a7a6a; }
.item.active .indicator { box-shadow: 0 0 8px rgba(201,168,76,0.3); }
.item-text { flex: 1; min-width: 0; }
.item-text .name { font-size: 13px; font-weight: 500; color: #e8ece8; }
.item-text .desc { font-size: 11px; color: #6a7a6a; margin-top: 2px; }
.item-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
.item-tag.point { background: rgba(201,168,76,0.1); color: #c9a84c; }
.item-tag.line { background: rgba(74,138,138,0.1); color: #4a8a8a; }
.item-tag.polygon { background: rgba(106,122,106,0.1); color: #8a9a8a; }
.sidebar-footer { padding: 10px 20px; border-top: 1px solid rgba(45,138,110,0.08); font-size: 11px; color: #6a7a6a; display: flex; justify-content: space-between; }

.map-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #080c09; overflow: hidden; }
.map-area .glow { position: absolute; top: 30%; left: 50%; width: 500px; height: 500px; transform: translate(-50%,-30%); background: radial-gradient(circle, rgba(45,138,110,0.03) 0%, transparent 70%); }
.map-area .center-text { font-size: 13px; color: #2a3a2a; letter-spacing: 0.08em; font-family: 'Plus Jakarta Sans', sans-serif; z-index: 1; }

.toolbar { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 4px; padding: 8px; background: rgba(12,17,14,0.9); backdrop-filter: blur(16px); border-radius: 16px; border: 1px solid rgba(45,138,110,0.1); }
.toolbar .tool { width: 46px; height: 46px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #6a7a6a; font-size: 10px; cursor: default; }
.toolbar .tool.active { background: linear-gradient(135deg, #2d8a6e, #1a6b52); color: #ffffff; box-shadow: 0 2px 12px rgba(45,138,110,0.3); }
.toolbar .tool svg { width: 18px; height: 18px; margin-bottom: 1px; }

.infocard { position: absolute; right: 80px; top: 20px; width: 320px; background: rgba(12,17,14,0.92); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(45,138,110,0.1); padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
.infocard .title { font-size: 15px; font-weight: 600; color: #e8ece8; margin-bottom: 16px; display: flex; justify-content: space-between; font-family: 'Playfair Display', serif; }
.infocard .field { margin-bottom: 12px; }
.infocard .field label { font-size: 10px; color: #6a7a6a; display: block; margin-bottom: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
.infocard .field input { width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(45,138,110,0.1); background: rgba(255,255,255,0.02); font-size: 12px; color: #d4dcd4; outline: none; font-family: inherit; }
.infocard .actions { display: flex; gap: 8px; margin-top: 18px; }
.infocard .actions .btn { flex: 1; padding: 9px; border-radius: 10px; border: none; font-size: 12px; cursor: default; font-family: inherit; font-weight: 600; }
.infocard .actions .btn.primary { background: linear-gradient(135deg, #2d8a6e, #1a6b52); color: #ffffff; }
.infocard .actions .btn.danger { background: rgba(201,168,76,0.1); color: #c9a84c; }

.style-label { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 0.12em; z-index: 100; font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>
<body>
<header>
  <div class="left"><div class="logo">◆</div><h1>李沧区地块数据</h1><span class="badge">编辑中</span></div>
  <div class="actions"><span>导入</span><span>导出</span><span>⚙</span></div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-tabs"><span class="active">列表</span><span>分组</span></div>
    <div class="sidebar-search"><input type="text" placeholder="搜索标注..." /></div>
    <div class="sidebar-list">
      <div class="item active"><div class="indicator point"></div><div class="item-text"><div class="name">地块 A-01</div><div class="desc">面积 45.2 亩</div></div><span class="item-tag point">点</span></div>
      <div class="item"><div class="indicator polygon"></div><div class="item-text"><div class="name">规划区域 B</div><div class="desc">容积率 2.5</div></div><span class="item-tag polygon">面</span></div>
      <div class="item"><div class="indicator line"></div><div class="item-text"><div class="name">地铁 3 号线</div><div class="desc">长度 12.3 km</div></div><span class="item-tag line">线</span></div>
    </div>
    <div class="sidebar-footer">3 个标注 · 2 个分组</div>
  </div>
  <div class="map-area">
    <div class="glow"></div><div class="center-text">🗺️ 地图区域</div>
    <div class="toolbar">
      <div class="tool active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>选择</div>
      <div class="tool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>点</div>
      <div class="tool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 9 11 14 14 20 4"/></svg>线</div>
      <div class="tool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 9 18 21 6 21 2 9"/></svg>面</div>
    </div>
    <div class="infocard">
      <div class="title"><span>地块 A-01</span><span style="color:#6a7a6a;cursor:default;">✕</span></div>
      <div class="field"><label>名称</label><input type="text" value="地块 A-01" /></div>
      <div class="field"><label>面积 (㎡)</label><input type="text" value="45.2" /></div>
      <div class="field"><label>容积率</label><input type="text" value="2.5" /></div>
      <div class="actions"><button class="btn primary">保存</button><button class="btn danger">删除</button></div>
    </div>
  </div>
</div>
<div class="style-label">STYLE E · 翡翠暗夜 · 深绿 + 金 · 奢华感</div>
</body>
</html>
